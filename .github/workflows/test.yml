name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps (ChromaDB / SQLite on Linux)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential libsqlite3-dev

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt', 'pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install project (editable, para resolver imports de src)
        run: pip install -e .

      - name: Debug imports
        env:
          OPENAI_API_KEY: "sk-fake-key-for-ci"
          OPENAI_MODEL_ANSWER: "gpt-4o-mini"
          OPENAI_MODEL_EVAL: "gpt-4o-mini"
          OPENAI_EMBEDDING_MODEL: "text-embedding-3-small"
        run: |
          python -c "import sys; print(sys.version)"
          python -c "import chromadb; print('chromadb OK')"
          python -c "import src; print('src OK')"
          python -c "import src.build_index; import src.query; print('src.build_index, src.query OK')"

      - name: Run tests
        env:
          PYTHONPATH: "."
          OPENAI_API_KEY: "sk-fake-key-for-ci"
          OPENAI_MODEL_ANSWER: "gpt-4o-mini"
          OPENAI_MODEL_EVAL: "gpt-4o-mini"
          OPENAI_EMBEDDING_MODEL: "text-embedding-3-small"
        run: python -m pytest tests/ -v --tb=long
