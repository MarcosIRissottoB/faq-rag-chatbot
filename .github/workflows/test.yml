name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show environment
        run: |
          echo "::group::Environment"
          python --version
          which python
          pip list | head -30
          echo "::endgroup::"

      - name: Install system deps (ChromaDB / SQLite on Linux)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential libsqlite3-dev

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt', 'pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install project (editable, para resolver imports de src)
        run: pip install -e .

      - name: Debug imports
        env:
          OPENAI_API_KEY: "sk-fake-key-for-ci"
          OPENAI_MODEL_ANSWER: "gpt-4o-mini"
          OPENAI_MODEL_EVAL: "gpt-4o-mini"
          OPENAI_EMBEDDING_MODEL: "text-embedding-3-small"
        run: |
          set -e
          echo "=== Python ==="
          python -c "import sys; print(sys.version)"
          echo "=== Checking chromadb ==="
          python -c "import chromadb; print('chromadb OK')"
          echo "=== Checking src ==="
          python -c "import src; print('src OK')"
          echo "=== Checking src.constants ==="
          python -c "import src.constants; print('src.constants OK')"
          echo "=== Checking src.config (needs OPENAI_* env) ==="
          python -c "import src.config; print('src.config OK')"
          echo "=== Checking src.build_index ==="
          python -c "import src.build_index; print('src.build_index OK')"
          echo "=== Checking src.query ==="
          python -c "import src.query; print('src.query OK')"
          echo "=== All imports OK ==="

      - name: Run tests
        env:
          PYTHONPATH: "."
          OPENAI_API_KEY: "sk-fake-key-for-ci"
          OPENAI_MODEL_ANSWER: "gpt-4o-mini"
          OPENAI_MODEL_EVAL: "gpt-4o-mini"
          OPENAI_EMBEDDING_MODEL: "text-embedding-3-small"
        run: python -m pytest tests/ -vv -rA --tb=long
